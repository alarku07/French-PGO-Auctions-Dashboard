services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    volumes:
      - ./src/backend:/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
      ]

  frontend:
    build:
      context: src/frontend
      target: dev
    volumes:
      - ./src/frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx-proxy:
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro

volumes:
  frontend_node_modules:
